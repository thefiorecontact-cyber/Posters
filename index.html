    <script type="module">

        import { animate, createTimeline, svg, createDraggable } from 'https://esm.sh/animejs@4';



        const SUN_INTRO_MS = 1400;

        const DRAW_DURATION = 2600;

        const DRAW_RESET = '0.5 0.5';

        const DRAW_FULL = '0 1';



        const sun = document.querySelector('#sun');

        const world = document.querySelector('#world');

        const poster = document.querySelector('#poster');

        const [helloBlue] = svg.createDrawable('#hello-blue');

        const [helloWhite] = svg.createDrawable('#hello-white');



        helloBlue.draw = DRAW_RESET;

        helloWhite.draw = DRAW_RESET;



        const sunBox = sun.getBBox();

        sun.style.transformBox = 'fill-box';

        sun.style.transformOrigin = `${sunBox.x + sunBox.width / 2}px ${sunBox.y + sunBox.height / 2}px`;



        animate(sun, {

            rotate: 360,

            duration: 10000,

            ease: 'linear',

            loop: true,

        });



        const helloStory = createTimeline({

            loop: true,

            loopDelay: 500,

            onLoop: () => {

                helloBlue.draw = DRAW_RESET;

                helloWhite.draw = DRAW_RESET;

            },

        });



        helloStory

            .add(helloBlue, {

                draw: [DRAW_RESET, DRAW_FULL],

                duration: DRAW_DURATION,

                ease: 'outExpo',

            }, SUN_INTRO_MS)

            .add(helloWhite, {

                draw: [DRAW_RESET, DRAW_FULL],

                duration: DRAW_DURATION,

                ease: 'outExpo',

            })

            .set([helloBlue, helloWhite], {

                draw: DRAW_RESET,

                duration: 0,

            }, `+=400`);



        createDraggable(world, {

            trigger: world,

            container: poster,

            releaseStiffness: 0,

            releaseDamping: 0,

            onGrab: () => world.classList.add('is-dragging'),

            onRelease: () => world.classList.remove('is-dragging'),

        });

    </script>
